<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kolye SEO Üretici</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Georgia, serif;
      background: #f5f0e8;
      min-height: 100vh;
      padding: 32px 16px;
      color: #2d2a24;
    }
    .container { max-width: 620px; margin: 0 auto; }
    h1 { text-align: center; font-size: 24px; margin-bottom: 6px; }
    .subtitle { text-align: center; color: #7a6f60; font-size: 14px; margin-bottom: 24px; }

    .platforms { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .platform-btn {
      flex: 1; min-width: 80px; padding: 10px 8px;
      border-radius: 8px; border: 2px solid #ddd;
      background: #fff; color: #555; font-weight: 600;
      font-size: 13px; cursor: pointer; transition: all 0.15s;
      font-family: inherit;
    }
    .platform-btn.active { color: #fff; border-color: transparent; }

    .dropzone {
      border: 2px dashed #c9bfad; border-radius: 14px;
      background: #fdf8f0; min-height: 200px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer; margin-bottom: 16px;
      transition: border-color 0.2s; overflow: hidden;
    }
    .dropzone img { max-height: 280px; max-width: 100%; object-fit: contain; padding: 8px; }
    .dropzone-text { color: #8a7d6a; font-size: 15px; margin-bottom: 4px; }
    .dropzone-sub { color: #b5a89a; font-size: 13px; }

    .clear-btn {
      background: none; border: none; color: #a8956b;
      font-size: 13px; cursor: pointer; margin-bottom: 12px;
      text-decoration: underline; font-family: inherit;
    }

    .analyze-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #a8956b, #8a7555);
      color: #fff; border: none; border-radius: 10px;
      font-size: 16px; font-weight: 700; cursor: pointer;
      font-family: inherit; margin-bottom: 24px;
      transition: opacity 0.2s;
    }
    .analyze-btn:disabled { background: #d1c9bc; cursor: not-allowed; }

    .error {
      background: #fff0f0; border: 1px solid #fca5a5;
      border-radius: 8px; padding: 14px; color: #dc2626;
      font-size: 14px; margin-bottom: 16px;
    }

    .result-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 16px;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; }

    .card {
      background: #fafaf9; border: 1px solid #e7e5e0;
      border-radius: 10px; padding: 14px 16px; margin-bottom: 12px;
    }
    .card-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 6px;
    }
    .card-label {
      font-size: 11px; font-weight: 700; letter-spacing: 1px;
      color: #a8956b; text-transform: uppercase;
    }
    .card-text { font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .card-text.mono { font-family: monospace; font-size: 13px; }

    .copy-btn {
      background: #18181b; color: #fff; border: none;
      border-radius: 6px; padding: 4px 12px; font-size: 12px;
      cursor: pointer; transition: background 0.2s; font-family: inherit;
    }
    .copy-btn.copied { background: #22c55e; }

    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .tag {
      background: #f0ebe0; border: 1px solid #ddd5c0;
      border-radius: 20px; padding: 4px 12px;
      font-size: 12px; color: #5a4f3f;
    }
  </style>
</head>
<body>
<div class="container">
  <div style="text-align:center;font-size:32px;margin-bottom:8px">💎</div>
  <h1>Kolye SEO Üretici</h1>
  <p class="subtitle">Fotoğraf yükle → Platform seç → SEO içeriğini al</p>

  <!-- Platform Seçimi -->
  <div class="platforms" id="platforms">
    <button class="platform-btn active" data-platform="etsy" data-color="#F1641E" onclick="selectPlatform(this)">Etsy</button>
    <button class="platform-btn" data-platform="trendyol" data-color="#F27A1A" onclick="selectPlatform(this)">Trendyol</button>
    <button class="platform-btn" data-platform="amazon" data-color="#FF9900" onclick="selectPlatform(this)">Amazon</button>
    <button class="platform-btn" data-platform="instagram" data-color="#E1306C" onclick="selectPlatform(this)">Instagram</button>
    <button class="platform-btn" data-platform="shopier" data-color="#7C3AED" onclick="selectPlatform(this)">Shopier</button>
  </div>

  <!-- Upload -->
  <div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()"
       ondrop="handleDrop(event)" ondragover="event.preventDefault()">
    <div id="dropContent">
      <div style="font-size:40px;text-align:center;margin-bottom:10px">📸</div>
      <p class="dropzone-text">Kolye fotoğrafını buraya sürükle</p>
      <p class="dropzone-sub">veya tıkla</p>
    </div>
  </div>
  <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(this.files[0])"/>
  <button class="clear-btn" id="clearBtn" style="display:none" onclick="clearImage()">× Görseli kaldır</button>

  <button class="analyze-btn" id="analyzeBtn" disabled onclick="analyze()">SEO Üret</button>

  <div class="error" id="errorBox" style="display:none"></div>
  <div id="results"></div>
</div>

<script>
  let imageBase64 = null;
  let currentPlatform = "etsy";
  let currentColor = "#F1641E";

  function selectPlatform(btn) {
    document.querySelectorAll(".platform-btn").forEach(b => {
      b.classList.remove("active");
      b.style.background = "#fff";
      b.style.color = "#555";
    });
    btn.classList.add("active");
    btn.style.background = btn.dataset.color;
    btn.style.color = "#fff";
    currentPlatform = btn.dataset.platform;
    currentColor = btn.dataset.color;
  }

  function handleDrop(e) {
    e.preventDefault();
    handleFile(e.dataTransfer.files[0]);
  }

  function handleFile(file) {
    if (!file || !file.type.startsWith("image/")) return;
    document.getElementById("results").innerHTML = "";
    document.getElementById("errorBox").style.display = "none";
    const reader = new FileReader();
    reader.onload = (e) => {
      imageBase64 = e.target.result.split(",")[1];
      const dz = document.getElementById("dropzone");
      dz.innerHTML = `<img src="${e.target.result}" alt="Kolye"/>`;
      dz.style.borderColor = currentColor;
      document.getElementById("clearBtn").style.display = "block";
      document.getElementById("analyzeBtn").disabled = false;
    };
    reader.readAsDataURL(file);
  }

  function clearImage() {
    imageBase64 = null;
    const dz = document.getElementById("dropzone");
    dz.innerHTML = `<div id="dropContent">
      <div style="font-size:40px;text-align:center;margin-bottom:10px">📸</div>
      <p class="dropzone-text">Kolye fotoğrafını buraya sürükle</p>
      <p class="dropzone-sub">veya tıkla</p>
    </div>`;
    dz.style.borderColor = "#c9bfad";
    document.getElementById("clearBtn").style.display = "none";
    document.getElementById("analyzeBtn").disabled = true;
    document.getElementById("results").innerHTML = "";
  }

  function copyText(text, btn) {
    navigator.clipboard.writeText(text);
    btn.textContent = "✓ Kopyalandı";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "Kopyala"; btn.classList.remove("copied"); }, 1800);
  }

  function escapeHtml(s) {
    if (s == null) return "";
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function makeCard(label, value, mono) {
    if (!value) return "";
    const id = "v" + Math.random().toString(36).slice(2);
    return `<div class="card">
      <div class="card-header">
        <span class="card-label">${escapeHtml(label)}</span>
        <button class="copy-btn" onclick="copyText(document.getElementById('${id}').textContent, this)">Kopyala</button>
      </div>
      <p class="card-text ${mono ? 'mono' : ''}" id="${id}">${escapeHtml(value)}</p>
    </div>`;
  }

  function makeListCard(label, items) {
    if (!items || !items.length) return "";
    const id = "v" + Math.random().toString(36).slice(2);
    const listHtml = items.map(i => "• " + i).join("\n");
    return `<div class="card">
      <div class="card-header">
        <span class="card-label">${escapeHtml(label)}</span>
        <button class="copy-btn" onclick="copyText(document.getElementById('${id}').textContent, this)">Kopyala</button>
      </div>
      <p class="card-text" id="${id}" style="white-space:pre-line">${escapeHtml(listHtml)}</p>
    </div>`;
  }

  function makeSSSCard(items) {
    if (!items || !items.length) return "";
    const id = "v" + Math.random().toString(36).slice(2);
    const html = items.map(s => `S: ${s.soru}\nC: ${s.cevap}`).join("\n\n");
    return `<div class="card">
      <div class="card-header">
        <span class="card-label">Sıkça Sorulan Sorular</span>
        <button class="copy-btn" onclick="copyText(document.getElementById('${id}').textContent, this)">Kopyala</button>
      </div>
      <p class="card-text" id="${id}" style="white-space:pre-line">${escapeHtml(html)}</p>
    </div>`;
  }

  function makeHashtagsCard(groups) {
    if (!groups) return "";
    const id = "v" + Math.random().toString(36).slice(2);
    const parts = [];
    if (groups.genis?.length) parts.push("Geniş (1M+):\n" + groups.genis.join(" "));
    if (groups.orta?.length) parts.push("Orta (100K-1M):\n" + groups.orta.join(" "));
    if (groups.nis?.length) parts.push("Niş:\n" + groups.nis.join(" "));
    if (!parts.length) return "";
    return `<div class="card">
      <div class="card-header">
        <span class="card-label">Hashtag Stratejisi</span>
        <button class="copy-btn" onclick="copyText(document.getElementById('${id}').textContent, this)">Kopyala</button>
      </div>
      <p class="card-text" id="${id}" style="white-space:pre-line">${escapeHtml(parts.join("\n\n"))}</p>
    </div>`;
  }

  function sectionHeader(title) {
    return `<div style="margin:22px 0 10px;font-size:11px;font-weight:700;letter-spacing:1.5px;color:#a8956b;text-transform:uppercase">${escapeHtml(title)}</div>`;
  }

  function renderResult(data, color) {
    let html = `<div class="result-header">
      <div class="dot" style="background:${color}"></div>
      <strong style="font-size:15px">SEO İçeriği Hazır</strong>
    </div>`;

    html += sectionHeader("Temel İçerik");
    html += makeCard("Ürün Adı / Başlık", data.urun_adi);
    if (data.alternatif_basliklar?.length) html += makeListCard("Alternatif Başlıklar (A/B Test)", data.alternatif_basliklar);
    html += makeCard("Açıklama", data.aciklama);
    html += makeCard("Kısa Açıklama (Sosyal Medya)", data.kisa_aciklama);

    html += sectionHeader("SEO & Dosya");
    html += makeCard("Google Meta Title (60 kr)", data.seo_meta_title);
    html += makeCard("Google Meta Description (155 kr)", data.seo_meta_description);
    html += makeCard("Resim Dosya Adı (URL)", data.resim_adi, true);
    if (data.search_terms) html += makeCard("Search Terms (Backend)", data.search_terms, true);
    if (data.etiketler?.length) {
      const id = "v" + Math.random().toString(36).slice(2);
      html += `<div class="card">
        <div class="card-header">
          <span class="card-label">Etiketler / Tags (${data.etiketler.length})</span>
          <button class="copy-btn" onclick="copyText(document.getElementById('${id}').textContent, this)">Kopyala</button>
        </div>
        <div class="tags">${data.etiketler.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join("")}</div>
        <p class="card-text" id="${id}" style="display:none">${escapeHtml(data.etiketler.join(", "))}</p>
      </div>`;
    }

    html += sectionHeader("Ürün Detayı");
    if (data.malzemeler?.length) html += makeCard("Malzemeler", data.malzemeler.join(", "));
    html += makeCard("Tarz", data.tarz);
    html += makeCard("Taş Türü", data.tas_turu);
    if (data.renkler?.length) html += makeCard("Renkler", data.renkler.join(", "));
    html += makeCard("Uzunluk", data.uzunluk);
    html += makeCard("Kime Uygun", data.kisinin_stili);
    if (data.one_cikan_ozellikler?.length) html += makeListCard("Öne Çıkan Özellikler (Bullet)", data.one_cikan_ozellikler);
    html += makeCard("Kategori", data.kategori);

    html += sectionHeader("Satış & Hediye");
    html += makeCard("Hediye Uygunluğu", data.hediye_uygunlugu);
    if (data.hediye_mesajlari?.length) html += makeListCard("Hediye Kartı Mesajları", data.hediye_mesajlari);
    html += makeCard("Kargo & Paketleme", data.kargo_paket);
    html += makeCard("Bakım Talimatları", data.bakim_talimatlari);
    if (data.cta_secenekleri?.length) html += makeListCard("CTA Önerileri", data.cta_secenekleri);
    html += makeCard("Neden Bu Kolyeyi Almalıyım?", data.duygusal_satis_metni);

    html += sectionHeader("Sosyal Medya");
    html += makeCard("YouTube Video Başlığı", data.video_adi);
    if (data.reel_script) html += makeCard("Reels / Shorts Senaryosu", data.reel_script, true);
    if (data.post_caption) html += makeCard("Instagram Post Caption", data.post_caption);
    if (data.story_text) html += makeCard("Instagram Story Metni", data.story_text);
    if (data.dm_sablon) html += makeCard("DM Otomatik Yanıt Şablonu", data.dm_sablon);
    if (data.hashtag_gruplari) html += makeHashtagsCard(data.hashtag_gruplari);

    if (data.sss?.length) {
      html += sectionHeader("Müşteri SSS");
      html += makeSSSCard(data.sss);
    }

    return html;
  }

  async function analyze() {
    if (!imageBase64) return;
    const btn = document.getElementById("analyzeBtn");
    btn.disabled = true;
    btn.textContent = "✨ Analiz ediliyor...";
    document.getElementById("errorBox").style.display = "none";
    document.getElementById("results").innerHTML = "";

    try {
      const res = await fetch("/api/analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ imageBase64, platform: currentPlatform }),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      document.getElementById("results").innerHTML = renderResult(data, currentColor);
    } catch (err) {
      document.getElementById("errorBox").style.display = "block";
      document.getElementById("errorBox").textContent = "Hata: " + err.message;
    } finally {
      btn.disabled = false;
      btn.textContent = "SEO Üret";
    }
  }
</script>
</body>
</html>
